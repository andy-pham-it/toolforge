name: Publish to npmjs.org

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          scope: '@andy-toolforge'
      - run: npm ci
      - name: Debug npm auth config
        run: |
          echo "=== npm whoami ==="
          npm whoami 2>&1 || echo "FAILED: not authenticated"
          echo "=== configured registry ==="
          npm config get registry
          echo "=== scope registry ==="
          npm config get @andy-toolforge:registry
      - name: Publish changed packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Ensure auth is explicitly set for publish
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm config set @andy-toolforge:registry "https://registry.npmjs.org/"
          for pkg in packages/*/; do
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            # Check if this version already exists on registry
            if npm view "$name@$version" version 2>/dev/null; then
              echo "⏭️  $name@$version already published"
            else
              echo "📦 Publishing $name@$version..."
              (cd "$pkg" && npm publish --access public)
            fi
          done

  tag-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create git tag with root version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "⏭️  Tag $TAG already exists remotely — skipping"
          else
            echo "🏷️  Creating tag $TAG..."
            git tag "$TAG"
            git push origin "$TAG"
          fi
